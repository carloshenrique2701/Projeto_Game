<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo - Projeto Game</title>
    <link rel="stylesheet" href="css/jogo.css">

</head>
<body>
    <div id="game-container" style="display: block;">
        <header>
            <h1 align="center">Sussuros do Labirinto</h1>
            <p id="apelido" onclick="showOptions(event)">testar <img src="imgs/perfil.png" alt="imagem de perfil"></p>
        </header>
        
        <div class="options" style="display: none;">
            <ol>
                <a href="../perfil/perfil.html"><li>Meu Perfil</li></a>
                <a href="../ranking/ranking.html"><li>Ranking</li></a>
                <li onclick="logout(event)">Logout</li>
            </ol>
        </div>

        <div class="content">
            <div class="game-container"></div>
            <div class="tutorial"></div>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2023 Projeto Game. Todos os direitos reservados.</p>
    </div>

    <div class="apelido" style="display: none;">
        <h1>Qual é seu apelido? <br>(Esse apelido irá aparecer para todos na comunidade)</h1>
        <input type="text" placeholder="Digite seu apelido" maxlength="50">
        <div id="apelido-feedback" style="color: red; margin: 10px 0; display: none;"></div>
        <button onclick="registrarApelido()">Confirmar</button>
    </div>

        <!-- Container do jogo (coloque onde quiser) -->
    <div id="game-container" style="width: 800px; height: 600px; margin: 0 auto;"></div>

    <!-- Scripts do pygbag (adicione antes do </body>) -->
    <script src="caminho/para/pygbag.js"></script>
    <script src="caminho/para/meu_jogo.js"></script>
    <script>
    // Configuração do jogo
    window.addEventListener('load', () => {
        pygameweb.app.runner.runApp({
        // Container personalizado
        canvas: document.getElementById("game-container"),
        // Arquivos do jogo
        data: "caminho/para/meu_jogo.data",
        wasm: "caminho/para/meu_jogo.wasm",
        // Outras configurações
        width: 800,
        height: 600,
        fullscreen: false,
        });
    });
    </script>

    <script src="js/script.js"></script>
    <script src="js/requisicao-Apelido.js"></script>

    
    
</body>
</html>
